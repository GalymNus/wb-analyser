name: Deploy to GitHub Pages and Replace

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Firebase Config
        env:
          DATA: ${{ secrets.APIKEY }}

        run: |
          echo "$DATA" > firebase_secret.json
          perl -i -0777 -pe '
            BEGIN { open $f, "<", "firebase_secret.json"; $secret = do { local $/; <$f> }; }
            s|.*import \{ firebaseConfig \} from "./config.js";|const firebaseConfig = $secret;|g
          ' auth.js
          rm firebase_secret.json
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
