name: Deploy to GitHub Pages and Replace

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Firebase Config
        env:
          DATA: ${{ secrets.API_KEY }}
        run: |
          [[ -z "$DATA" ]] && { echo "СЕКРЕТ ВСЕ ЕЩЕ ПУСТОЙ"; exit 1; }

          # Заменяем строку
          sed -i "s|.*import { firebaseConfig }.*|const firebaseConfig = $DATA;|" auth.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
