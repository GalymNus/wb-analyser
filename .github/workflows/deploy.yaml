name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Firebase Config
        run: |
          export NEW_LINE="const firebaseConfig = ${{ secrets.MY_FIREBASE_CONFIG }};"
          sed -i "s|import { firebaseConfig } from \"./config.js\";|$NEW_LINE|g" index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
