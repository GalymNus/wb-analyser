name: Deploy to GitHub Pages and Replace

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Firebase Config
        run: |
          sed -i 's|.*import { firebaseConfig } from "./config.js";|const firebaseConfig = "HELLO_WORLD";|' auth.html
          echo "--- Результат работы sed (первые 40 строк): ---"
          head -n 40 auth.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
