<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Расчет себестоимости</title>
    <script src="xlsx.full.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.js"></script>
    <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css" />
  </head>

  <body>
    <section>
      <div id="authContainer" class="shadow-deep">
        <h2 id="authTitle">Авторизация</h2>
        <input type="email" class="auth-input" id="email" placeholder="Email" required />
        <input type="password" class="auth-input" id="password" placeholder="Пароль" required />
        <input
          type="password"
          class="auth-input"
          id="passwordConfirm"
          style="display: none"
          placeholder="Подтвердите пароль"
          required
        />

        <div class="buttonWrapper">
          <button id="authButton">Войти</button>
          <div><span id="authModeLabel"> Нет аккаунта? </span><a id="authModeLink">Зарегистрироваться</a></div>
        </div>
        <span id="statusMsg"></span>

        <div id="firebaseui-auth-container"></div>
        <p id="auth-status"></p>
      </div>
      <div id="authUserInfo" style="display: none">
        <p id="authUserLogin"></p>
        <button id="btnLogout">Выйти</button>
      </div>
    </section>
    <section id="calcContainer"></section>
    <section id="finalResult"></section>
  </body>
  <script type="module" src="auth.js"></script>
  <script src="index.js"></script>
</html>
