<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        --wb-purple: #481173;
        --wb-magenta: #cb11ab;
        --wb-light-gray: #f6f6f9;
        --wb-text: #2b2b2b;
      }

      body {
        font-family: "Roboto", sans-serif;
        background-color: var(--wb-light-gray);
        color: var(--wb-text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      #auth-container {
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      h2 {
        color: var(--wb-purple);
        font-weight: 700;
        margin-bottom: 30px;
      }

      input {
        width: 100%;
        padding: 14px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 12px;
        box-sizing: border-box;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: var(--wb-magenta);
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.3s,
          transform 0.1s;
      }

      #btnLogin {
        background: linear-gradient(90deg, #481173 0%, #cb11ab 100%);
        color: white;
      }

      #btnReg {
        background-color: transparent;
        color: var(--wb-magenta);
        border: 1px solid var(--wb-magenta);
      }

      #btnLogout {
        background-color: #ff4d4d;
        color: white;
        margin-top: 20px;
      }

      button:hover {
        opacity: 0.9;
      }

      button:active {
        transform: scale(0.98);
      }

      #statusMsg {
        display: block;
        margin-top: 15px;
        font-size: 14px;
        color: #666;
      }

      /* Стиль для калькулятора, когда он появится */
      #myCalcContainer {
        background: white;
        padding: 30px;
        border-radius: 24px;
        margin-top: 20px;
        border: 2px solid var(--wb-purple);
      }
    </style>
  </head>

  <body>
    <div id="auth-container">
      <h2 id="auth-title">Вход в систему</h2>

      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Пароль" required />

      <div class="buttons">
        <button id="btnLogin">Войти</button>
        <button id="btnReg">Регистрация</button>
      </div>
      <span id="statusMsg"></span>

      <div id="firebaseui-auth-container"></div>
      <button id="btnLogout" style="display: none">Выйти</button>
      <p id="auth-status"></p>
    </div>

    <div id="myCalcContainer" style="display: none">
      <h2>Ваш калькулятор прибыли WB</h2>
    </div>
    <script src="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.js"></script>
    <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css" />
    <script type="module">
      import { firebaseConfig } from "./config.js";
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const analytics = getAnalytics(app);

      const emailInp = document.getElementById("email");
      const passInp = document.getElementById("password");
      const btnLogin = document.getElementById("btnLogin");
      const btnReg = document.getElementById("btnReg");
      const btnLogout = document.getElementById("btnLogout");
      const statusMsg = document.getElementById("statusMsg");
      const calcContainer = document.getElementById("myCalcContainer");

      btnReg.onclick = () => {
        createUserWithEmailAndPassword(auth, emailInp.value, passInp.value).catch(
          (err) => (statusMsg.innerText = "Ошибка: " + err.message),
        );
      };

      btnLogin.onclick = () => {
        signInWithEmailAndPassword(auth, emailInp.value, passInp.value).catch(
          (err) => (statusMsg.innerText = "Ошибка: " + err.message),
        );
      };

      btnLogout.onclick = () => signOut(auth);

      onAuthStateChanged(auth, (user) => {
        if (user) {
          calcContainer.style.display = "block";
          btnLogout.style.display = "inline-block";
          btnLogin.style.display = "none";
          btnReg.style.display = "none";
          emailInp.style.display = "none";
          passInp.style.display = "none";
          statusMsg.innerText = "Вы вошли как: " + user.email;
        } else {
          calcContainer.style.display = "none";
          btnLogout.style.display = "none";
          btnLogin.style.display = "inline-block";
          btnReg.style.display = "inline-block";
          emailInp.style.display = "inline-block";
          passInp.style.display = "inline-block";
          statusMsg.innerText = "Пожалуйста, авторизуйтесь для доступа к расчетам";
        }
      });
    </script>
  </body>
</html>
